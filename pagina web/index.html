<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Space Survivor WASD + Click</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        body {
            background-color: #020617;
            color: #fff;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            padding: 10px;
        }
        #gameZone {
            position: relative;
            width: 100%;
            max-width: 420px;
            height: 65vh;
            max-height: 550px;
            border: 2px solid #334155;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.15);
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #0f172a 0%, #020617 100%);
            cursor: crosshair; /* Cambia el puntero por una mira en PC */
        }
        #settingsPanel {
            width: 100%;
            max-width: 420px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 10px 15px;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.9rem;
            color: #94a3b8;
        }
        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-grow: 1;
            justify-content: flex-end;
        }
        input[type="range"] {
            accent-color: #38bdf8;
            cursor: pointer;
            width: 120px;
        }
        /* Controles móviles ajustados para 4 direcciones */
        #controls {
            width: 100%;
            max-width: 420px;
            height: 16vh;
            margin-top: 10px;
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 15px;
        }
        #joystick {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 5px;
        }
        .joy-btn {
            background: rgba(30, 41, 59, 0.7);
            border: 2px solid #64748b;
            border-radius: 10px;
            color: #fff;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .joy-btn:active { background: #64748b; }
        /* Centrar el botón de arriba en la primera fila */
        #btnUp { grid-column: 2; }
        #btnLeft { grid-column: 1; grid-row: 2; }
        #btnDown { grid-column: 2; grid-row: 2; }
        #btnRight { grid-column: 3; grid-row: 2; }

        .btn-fire {
            background: rgba(30, 41, 59, 0.7);
            border: 2px solid #f43f5e;
            border-radius: 16px;
            color: #fff;
            font-size: 1.3rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            cursor: pointer;
        }
        .btn-fire:active {
            background: #f43f5e;
            color: #fff;
        }
        .pc-tip {
            margin-top: 8px;
            font-size: 0.85rem;
            color: #64748b;
            display: none;
            text-align: center;
        }
        @media (pointer: fine) {
            .pc-tip { display: block; }
        }
    </style>
</head>
<body>

    <div id="gameZone">
        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="settingsPanel">
        <span>⚙️ Sensibilidad:</span>
        <div class="slider-container">
            <input type="range" id="sensSlider" min="3" max="15" step="1" value="7">
            <span id="sensValue" style="color: #38bdf8; font-weight: bold; min-width: 20px; text-align: right;">7</span>
        </div>
    </div>

    <div id="controls">
        <div id="joystick">
            <div class="joy-btn" id="btnUp">↑</div>
            <div class="joy-btn" id="btnLeft">←</div>
            <div class="joy-btn" id="btnDown">↓</div>
            <div class="joy-btn" id="btnRight">→</div>
        </div>
        <div class="btn-fire" id="btnFire">FUEGO</div>
    </div>

    <div class="pc-tip">PC: Moverse con <b>WASD</b> | Disparar con <b>Click Izquierdo</b> | Enter Reiniciar</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = 400;
        canvas.height = 600;

        let gameActive = true;
        let score = 0;
        let level = 1;
        
        let keys = {};
        let moveLeft = false, moveRight = false, moveUp = false, moveDown = false;
        let isFiring = false;

        const savedSens = localStorage.getItem('spaceSurvivorSens') || 7;
        
        const player = {
            x: canvas.width / 2 - 20,
            y: canvas.height - 100, // Un poco más arriba para dar margen de retroceso
            width: 40,
            height: 40,
            speed: parseInt(savedSens),
            color: '#00f0ff'
        };

        const sensSlider = document.getElementById('sensSlider');
        const sensValueDisplay = document.getElementById('sensValue');
        sensSlider.value = player.speed;
        sensValueDisplay.textContent = player.speed;

        sensSlider.addEventListener('input', (e) => {
            const newSens = parseInt(e.target.value);
            player.speed = newSens;
            sensValueDisplay.textContent = newSens;
            localStorage.setItem('spaceSurvivorSens', newSens);
        });

        let lasers = [];
        let enemies = [];
        let particles = [];
        let enemySpawnTimer = 0;
        let enemySpawnInterval = 50;

        // --- CONTROLES PC (WASD + RATÓN) ---
        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'Enter' && !gameActive) resetGame();
        });
        window.addEventListener('keyup', (e) => {
            keys[e.code] = false;
        });

        // Click e inicio de ráfaga con click izquierdo
        window.addEventListener('mousedown', (e) => {
            if (e.button === 0) { // 0 es Click Izquierdo
                if (!gameActive) {
                    resetGame();
                } else {
                    isFiring = true;
                }
            }
        });
        window.addEventListener('mouseup', (e) => {
            if (e.button === 0) isFiring = false;
        });

        // --- CONTROLES CELULAR (TOUCH) ---
        setupTouchBtn('btnKeyUp', 'btnUp', status => moveUp = status);
        setupTouchBtn('btnKeyDown', 'btnDown', status => moveDown = status);
        setupTouchBtn('btnKeyLeft', 'btnLeft', status => moveLeft = status);
        setupTouchBtn('btnKeyRight', 'btnRight', status => moveRight = status);
        setupTouchBtn('btnKeyFire', 'btnFire', status => isFiring = status);

        function setupTouchBtn(dummy, id, callback) {
            const btn = document.getElementById(id);
            if(!btn) return;
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); callback(true); });
            btn.addEventListener('touchend', (e) => { e.preventDefault(); callback(false); });
        }

        canvas.addEventListener('touchstart', (e) => { 
            if (!gameActive) resetGame(); 
        });

        function createExplosion(x, y, color) {
            for (let i = 0; i < 12; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 5,
                    vy: (Math.random() - 0.5) * 5,
                    radius: Math.random() * 3 + 1,
                    alpha: 1,
                    decay: Math.random() * 0.02 + 0.02,
                    color: color
                });
            }
        }

        function resetGame() {
            player.x = canvas.width / 2 - 20;
            player.y = canvas.height - 100;
            lasers = []; enemies = []; particles = [];
            score = 0; level = 1; enemySpawnInterval = 50;
            isFiring = false;
            gameActive = true;
            loop();
        }

        function update() {
            if (!gameActive) return;

            // Movimiento 4 Direcciones (WASD + Flechas táctiles)
            if ((keys['KeyA'] || moveLeft) && player.x > 0) {
                player.x -= player.speed;
            }
            if ((keys['KeyD'] || moveRight) && player.x < canvas.width - player.width) {
                player.x += player.speed;
            }
            if ((keys['KeyW'] || moveUp) && player.y > 0) {
                player.y -= player.speed;
            }
            if ((keys['KeyS'] || moveDown) && player.y < canvas.height - player.height) {
                player.y += player.speed;
            }

            // Sistema de disparo por ráfagas (Click Izquierdo mantenido)
            if (isFiring) {
                if (lasers.length === 0 || lasers[lasers.length - 1].y < player.y - 120) {
                    lasers.push({
                        x: player.x + player.width / 2 - 3,
                        y: player.y,
                        width: 6,
                        height: 14,
                        speed: 12
                    });
                }
            }

            for (let i = lasers.length - 1; i >= 0; i--) {
                lasers[i].y -= lasers[i].speed;
                if (lasers[i].y < 0) lasers.splice(i, 1);
            }

            enemySpawnInterval = Math.max(16, 50 - Math.floor(score / 12) * 5);
            level = Math.floor(score / 12) + 1;

            enemySpawnTimer++;
            if (enemySpawnTimer >= enemySpawnInterval) {
                enemySpawnTimer = 0;
                const size = Math.random() * 25 + 20;
                enemies.push({
                    x: Math.random() * (canvas.width - size),
                    y: -size,
                    width: size,
                    height: size,
                    speed: Math.random() * 1.5 + 2.5 + (level * 0.35),
                    color: `hsl(${Math.random() * 35}, 80%, 55%)`
                });
            }

            for (let i = enemies.length - 1; i >= 0; i--) {
                enemies[i].y += enemies[i].speed;

                if (enemies[i].y > canvas.height) {
                    enemies.splice(i, 1);
                    score = Math.max(0, score - 1);
                    continue;
                }

                if (
                    enemies[i].x < player.x + player.width &&
                    enemies[i].x + enemies[i].width > player.x &&
                    enemies[i].y < player.y + player.height &&
                    enemies[i].y + enemies[i].height > player.y
                ) {
                    createExplosion(player.x + player.width/2, player.y + player.height/2, '#ff0055');
                    gameActive = false;
                }
            }

            for (let l = lasers.length - 1; l >= 0; l--) {
                for (let e = enemies.length - 1; e >= 0; e--) {
                    if (
                        lasers[l] &&
                        lasers[l].x < enemies[e].x + enemies[e].width &&
                        lasers[l].x + lasers[l].width > enemies[e].x &&
                        lasers[l].y < enemies[e].y + enemies[e].height &&
                        lasers[l].y + lasers[l].height > enemies[e].y
                    ) {
                        createExplosion(enemies[e].x + enemies[e].width/2, enemies[e].y + enemies[e].height/2, enemies[e].color);
                        enemies.splice(e, 1);
                        lasers.splice(l, 1);
                        score += 2;
                        break;
                    }
                }
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].x += particles[i].vx;
                particles[i].y += particles[i].vy;
                particles[i].alpha -= particles[i].decay;
                if (particles[i].alpha <= 0) particles.splice(i, 1);
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "rgba(255,255,255,0.12)";
            for(let i=0; i<3; i++){
                ctx.fillRect(Math.sin(Date.now()*0.001 + i)*150 + 200, (Date.now()*0.1 + i*150)%canvas.height, 2, 2);
            }

            if (gameActive) {
                ctx.fillStyle = player.color;
                ctx.shadowBlur = 12;
                ctx.shadowColor = player.color;
                ctx.beginPath();
                ctx.moveTo(player.x + player.width / 2, player.y);
                ctx.lineTo(player.x + player.width, player.y + player.height);
                ctx.lineTo(player.x, player.y + player.height);
                ctx.closePath();
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            ctx.fillStyle = '#f43f5e';
            lasers.forEach(l => ctx.fillRect(l.x, l.y, l.width, l.height));

            enemies.forEach(e => {
                ctx.fillStyle = e.color;
                ctx.fillRect(e.x, e.y, e.width, e.height);
            });

            particles.forEach(p => {
                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });

            ctx.fillStyle = '#fff';
            ctx.font = 'bold 16px sans-serif';
            ctx.fillText(`PUNTOS: ${score}`, 15, 30);
            ctx.fillText(`NIVEL: ${level}`, canvas.width - 100, 30);

            if (!gameActive) {
                ctx.fillStyle = 'rgba(2, 6, 23, 0.85)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = '#ff0055';
                ctx.font = 'bold 28px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('FIN DE LA PARTIDA', canvas.width / 2, canvas.height / 2 - 30);

                ctx.fillStyle = '#fff';
                ctx.font = '16px sans-serif';
                ctx.fillText(`Puntaje: ${score} | Nivel: ${level}`, canvas.width / 2, canvas.height / 2 + 10);
                
                ctx.fillStyle = '#38bdf8';
                ctx.font = 'bold 14px sans-serif';
                ctx.fillText('HACÉ CLICK O TOCÁ PARA REINICIAR', canvas.width / 2, canvas.height / 2 + 60);
                ctx.textAlign = 'left';
            }
        }

        function loop() {
            update();
            draw();
            if (gameActive) {
                requestAnimationFrame(loop);
            } else {
                draw();
            }
        }

        loop();
    </script>
</body>
</html>
